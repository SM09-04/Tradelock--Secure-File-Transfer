<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TradeLock — {% block title %}Secure Transfer{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>
<body>

  <!-- NAV -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-brand">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        TradeLock
      </a>
      <div class="nav-links">
        <a href="/transfer" class="nav-link {% if request.path == '/transfer' %}active{% endif %}">Secure Transfer</a>
        <a href="/attack"   class="nav-link {% if request.path == '/attack' %}active{% endif %}">Attack Lab</a>
        <a href="/audit"    class="nav-link {% if request.path == '/audit' %}active{% endif %}">Audit Log</a>
      </div>
    </div>
  </nav>

  <!-- PAGE -->
  <main class="page">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <p>TradeLock · AES-256-GCM · TOTP 2FA · Integrity Protected</p>
  </footer>

  <script>
    // Global toast utility
    function toast(msg, type = "info") {
      const t = document.createElement("div");
      t.className = `toast toast-${type}`;
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.classList.add("show"), 10);
      setTimeout(() => { t.classList.remove("show"); setTimeout(() => t.remove(), 300); }, 3500);
    }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
